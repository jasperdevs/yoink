name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            arch: x64
          - os: windows-latest
            rid: win-x86
            arch: x86
          - os: windows-11-arm
            rid: win-arm64
            arch: arm64

    runs-on: ${{ matrix.os }}
    name: Windows ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Yoink/Yoink.csproj -r ${{ matrix.rid }}

      - name: Test
        if: matrix.rid == 'win-x64'
        run: dotnet test tests/Yoink.Tests/Yoink.Tests.csproj -c Release

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Publish
        run: >
          dotnet publish src/Yoink/Yoink.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o publish

      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content src/Yoink/Yoink.csproj -Raw
          $version = ($csproj.Project.PropertyGroup.Version | Select-Object -First 1).Trim()
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version" -Encoding utf8

      - name: Build Velopack package
        shell: pwsh
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          $outDir = Join-Path $PWD "vpk-${{ matrix.rid }}"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          vpk pack `
            --packId JasperDevs.Yoink `
            --packVersion "${{ steps.version.outputs.version }}" `
            --packDir publish `
            --mainExe Yoink.exe `
            --packTitle Yoink `
            --packAuthors jasperdevs `
            --icon src/Yoink/yoink.ico `
            --channel "${{ matrix.rid }}" `
            --runtime "${{ matrix.rid }}" `
            --releaseNotes "docs/CHANGELOG.md" `
            --outputDir $outDir

          $setup = Get-ChildItem $outDir -Filter '*-Setup.exe' | Select-Object -First 1
          if ($null -ne $setup) {
            Rename-Item -LiteralPath $setup.FullName -NewName "Yoink-${{ matrix.rid }}-Setup.exe"
          }

          $portable = Get-ChildItem $outDir -Filter '*-Portable.zip' | Select-Object -First 1
          if ($null -ne $portable) {
            Rename-Item -LiteralPath $portable.FullName -NewName "Yoink-${{ matrix.rid }}-Portable.zip"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Velopack-${{ matrix.rid }}
          path: vpk-${{ matrix.rid }}/
          if-no-files-found: error
