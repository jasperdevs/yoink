name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            arch: x64
          - os: windows-latest
            rid: win-x86
            arch: x86
          - os: windows-11-arm
            rid: win-arm64
            arch: arm64

    runs-on: ${{ matrix.os }}
    name: Windows ${{ matrix.arch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/OddSnap/OddSnap.csproj -r ${{ matrix.rid }}

      - name: Test
        if: matrix.rid == 'win-x64'
        run: dotnet test tests/OddSnap.Tests/OddSnap.Tests.csproj -c Release

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Prepare code signing
        id: signing
        shell: pwsh
        env:
          WINDOWS_SIGN_PFX_BASE64: ${{ secrets.WINDOWS_SIGN_PFX_BASE64 }}
          WINDOWS_SIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_PFX_PASSWORD)) {
            exit 0
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "oddsnap-signing-cert.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_SIGN_PFX_BASE64))
          Add-Content -Path $env:GITHUB_OUTPUT -Value "pfx_path=$pfxPath" -Encoding utf8
          Add-Content -Path $env:GITHUB_OUTPUT -Value "sign_params=/fd SHA256 /f `"$pfxPath`" /p `"$env:WINDOWS_SIGN_PFX_PASSWORD`" /tr `"http://timestamp.digicert.com`" /td SHA256" -Encoding utf8

      - name: Publish
        run: >
          dotnet publish src/OddSnap/OddSnap.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o publish

      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content src/OddSnap/OddSnap.csproj -Raw
          $version = ($csproj.Project.PropertyGroup.Version | Select-Object -First 1).Trim()
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version" -Encoding utf8

      - name: Build Velopack package
        shell: pwsh
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          $outDir = Join-Path $PWD "vpk-${{ matrix.rid }}"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          vpk pack `
            --packId JasperDevs.OddSnap `
            --packVersion "${{ steps.version.outputs.version }}" `
            --packDir publish `
            --mainExe OddSnap.exe `
            --packTitle OddSnap `
            --packAuthors jasperdevs `
            --icon src/OddSnap/oddsnap.ico `
            --channel "${{ matrix.rid }}" `
            --runtime "${{ matrix.rid }}" `
            --releaseNotes "docs/CHANGELOG.md" `
            ${{ steps.signing.outputs.sign_params != '' && format('--signParams "{0}"', steps.signing.outputs.sign_params) || '' }} `
            --outputDir $outDir

          $rid = "${{ matrix.rid }}"
          $version = "${{ steps.version.outputs.version }}"
          $required = @(
            '*-Setup.exe',
            '*-Portable.zip',
            '*-full.nupkg',
            'RELEASES-*',
            'releases.*.json',
            'assets.*.json'
          )
          foreach ($pattern in $required) {
            if (-not (Get-ChildItem $outDir -Filter $pattern | Select-Object -First 1)) {
              throw "Expected Velopack output '$pattern' was not found in $outDir."
            }
          }

          $archLabel = "${{ matrix.arch }}"
          $setupName = "App-OddSnap-Setup-$archLabel.exe"
          $portableName = "App-OddSnap-Portable-$archLabel.zip"
          $fullName = "OddSnap-Update-$version-$rid-full.nupkg"

          $setup = Get-ChildItem $outDir -Filter '*-Setup.exe' | Select-Object -First 1
          $portable = Get-ChildItem $outDir -Filter '*-Portable.zip' | Select-Object -First 1
          $full = Get-ChildItem $outDir -Filter '*-full.nupkg' | Select-Object -First 1
          $setupOldName = $setup.Name
          $portableOldName = $portable.Name
          $fullOldName = $full.Name

          Move-Item -LiteralPath $setup.FullName -Destination (Join-Path $outDir $setupName) -Force
          Move-Item -LiteralPath $portable.FullName -Destination (Join-Path $outDir $portableName) -Force
          Move-Item -LiteralPath $full.FullName -Destination (Join-Path $outDir $fullName) -Force

          foreach ($releasesFile in Get-ChildItem $outDir -Filter 'RELEASES-*') {
            $content = Get-Content -LiteralPath $releasesFile.FullName -Raw
            Set-Content -LiteralPath $releasesFile.FullName -Value ($content.Replace($fullOldName, $fullName)) -NoNewline -Encoding utf8
          }

          foreach ($releaseJsonFile in Get-ChildItem $outDir -Filter 'releases.*.json') {
            $releaseJson = Get-Content -LiteralPath $releaseJsonFile.FullName -Raw | ConvertFrom-Json
            foreach ($asset in @($releaseJson.Assets)) {
              if ($asset.FileName -eq $fullOldName) { $asset.FileName = $fullName }
            }
            $releaseJson | ConvertTo-Json -Depth 20 -Compress | Set-Content -LiteralPath $releaseJsonFile.FullName -NoNewline -Encoding utf8
          }

          foreach ($assetsJsonFile in Get-ChildItem $outDir -Filter 'assets.*.json') {
            $assetsJson = Get-Content -LiteralPath $assetsJsonFile.FullName -Raw | ConvertFrom-Json
            foreach ($asset in @($assetsJson)) {
              if ($asset.RelativeFileName -eq $setupOldName) { $asset.RelativeFileName = $setupName }
              if ($asset.RelativeFileName -eq $portableOldName) { $asset.RelativeFileName = $portableName }
              if ($asset.RelativeFileName -eq $fullOldName) { $asset.RelativeFileName = $fullName }
            }
            $assetsJson | ConvertTo-Json -Depth 20 -Compress | Set-Content -LiteralPath $assetsJsonFile.FullName -NoNewline -Encoding utf8
          }

          $expectedFiles = @(
            $setupName,
            $portableName,
            $fullName,
            "RELEASES-$rid",
            "releases.$rid.json",
            "assets.$rid.json"
          )
          $actualFiles = Get-ChildItem $outDir -File | Select-Object -ExpandProperty Name
          foreach ($expectedFile in $expectedFiles) {
            if ($actualFiles -notcontains $expectedFile) {
              throw "Expected release output '$expectedFile' was not found in $outDir."
            }
          }
          if ($actualFiles | Where-Object { $_ -like '0-OddSnap-*' -or $_ -like 'JasperDevs.OddSnap-*' }) {
            throw "Release output contains an old or confusing user-facing asset name: $($actualFiles -join ', ')"
          }
          $assetsJsonText = Get-Content -LiteralPath (Join-Path $outDir "assets.$rid.json") -Raw
          if ($assetsJsonText -notmatch [regex]::Escape($setupName) -or
              $assetsJsonText -notmatch [regex]::Escape($portableName)) {
            throw "assets.$rid.json does not point to the user-facing App-OddSnap download names."
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Velopack-${{ matrix.rid }}
          path: vpk-${{ matrix.rid }}/
          if-no-files-found: error
