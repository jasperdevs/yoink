name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-x86
          - os: windows-latest
            rid: win-arm64

    runs-on: ${{ matrix.os }}
    name: Package ${{ matrix.rid }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Prepare code signing
        id: signing
        shell: pwsh
        env:
          WINDOWS_SIGN_PFX_BASE64: ${{ secrets.WINDOWS_SIGN_PFX_BASE64 }}
          WINDOWS_SIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_PFX_PASSWORD)) {
            exit 0
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "oddsnap-signing-cert.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_SIGN_PFX_BASE64))
          Add-Content -Path $env:GITHUB_OUTPUT -Value "pfx_path=$pfxPath" -Encoding utf8
          Add-Content -Path $env:GITHUB_OUTPUT -Value "sign_params=/fd SHA256 /f `"$pfxPath`" /p `"$env:WINDOWS_SIGN_PFX_PASSWORD`" /tr `"http://timestamp.digicert.com`" /td SHA256" -Encoding utf8

      - name: Restore dependencies
        run: dotnet restore src/OddSnap/OddSnap.csproj -r ${{ matrix.rid }}

      - name: Publish
        run: >
          dotnet publish src/OddSnap/OddSnap.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o publish

      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content src/OddSnap/OddSnap.csproj -Raw
          $version = ($csproj.Project.PropertyGroup.Version | Select-Object -First 1).Trim()
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version" -Encoding utf8

      - name: Build Velopack package
        shell: pwsh
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          $outDir = Join-Path $PWD "vpk-${{ matrix.rid }}"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          $packArgs = @(
            'pack',
            '--packId', 'JasperDevs.OddSnap',
            '--packVersion', '${{ steps.version.outputs.version }}',
            '--packDir', 'publish',
            '--mainExe', 'OddSnap.exe',
            '--packTitle', 'OddSnap',
            '--packAuthors', 'jasperdevs',
            '--icon', 'src/OddSnap/oddsnap.ico',
            '--channel', '${{ matrix.rid }}',
            '--runtime', '${{ matrix.rid }}',
            '--releaseNotes', 'docs/CHANGELOG.md'
          )
          if (-not [string]::IsNullOrWhiteSpace('${{ steps.signing.outputs.sign_params }}')) {
            $packArgs += @('--signParams', '${{ steps.signing.outputs.sign_params }}')
          }
          $packArgs += @('--outputDir', $outDir)
          & vpk @packArgs

          $rid = "${{ matrix.rid }}"
          $version = "${{ steps.version.outputs.version }}"
          $setupName = "OddSnap-Setup-$rid.exe"
          $portableName = "OddSnap-Portable-$rid.zip"
          $fullName = "OddSnap-Update-$version-$rid-full.nupkg"
          $releasesName = "OddSnap-RELEASES-$rid"
          $releaseJsonName = "OddSnap-releases-$rid.json"
          $assetsJsonName = "OddSnap-assets-$rid.json"

          $setup = Get-ChildItem $outDir -Filter '*-Setup.exe' | Select-Object -First 1
          if ($null -ne $setup) { Rename-Item -LiteralPath $setup.FullName -NewName $setupName }

          $portable = Get-ChildItem $outDir -Filter '*-Portable.zip' | Select-Object -First 1
          if ($null -ne $portable) { Rename-Item -LiteralPath $portable.FullName -NewName $portableName }

          $full = Get-ChildItem $outDir -Filter '*-full.nupkg' | Select-Object -First 1
          if ($null -ne $full) { Rename-Item -LiteralPath $full.FullName -NewName $fullName }

          $releases = Get-ChildItem $outDir -Filter 'RELEASES-*' | Select-Object -First 1
          if ($null -ne $releases) { Rename-Item -LiteralPath $releases.FullName -NewName $releasesName }

          $releaseJson = Get-ChildItem $outDir -Filter 'releases.*.json' | Select-Object -First 1
          if ($null -ne $releaseJson) { Rename-Item -LiteralPath $releaseJson.FullName -NewName $releaseJsonName }

          $assetsJson = Get-ChildItem $outDir -Filter 'assets.*.json' | Select-Object -First 1
          if ($null -ne $assetsJson) { Rename-Item -LiteralPath $assetsJson.FullName -NewName $assetsJsonName }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Velopack-${{ matrix.rid }}
          path: vpk-${{ matrix.rid }}/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content src/OddSnap/OddSnap.csproj -Raw
          $version = ($csproj.Project.PropertyGroup.Version | Select-Object -First 1).Trim()
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version" -Encoding utf8

      - name: Generate winget manifests
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "v$version"
          $baseUrl = "https://github.com/${{ github.repository }}/releases/download/$tag"

          $x64Setup = Get-Item 'dist/OddSnap-Setup-win-x64.exe'
          $x86Setup = Get-Item 'dist/OddSnap-Setup-win-x86.exe'
          $arm64Setup = Get-Item 'dist/OddSnap-Setup-win-arm64.exe'

          if ($null -eq $x64Setup -or $null -eq $x86Setup -or $null -eq $arm64Setup) {
            throw "Expected Velopack setup executables for x64/x86/arm64 were not found in dist."
          }

          & scripts/winget/New-WingetManifests.ps1 `
            -PackageVersion $version `
            -OutputDirectory (Join-Path $PWD 'dist\winget-manifests') `
            -X64InstallerUrl "$baseUrl/$($x64Setup.Name)" `
            -X64InstallerSha256 ((Get-FileHash -Algorithm SHA256 $x64Setup.FullName).Hash.ToUpperInvariant()) `
            -X86InstallerUrl "$baseUrl/$($x86Setup.Name)" `
            -X86InstallerSha256 ((Get-FileHash -Algorithm SHA256 $x86Setup.FullName).Hash.ToUpperInvariant()) `
            -Arm64InstallerUrl "$baseUrl/$($arm64Setup.Name)" `
            -Arm64InstallerSha256 ((Get-FileHash -Algorithm SHA256 $arm64Setup.FullName).Hash.ToUpperInvariant())

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OddSnap v${{ steps.version.outputs.version }}
          files: |
            dist/OddSnap-Setup-*.exe
            dist/OddSnap-Portable-*.zip
            dist/OddSnap-Update-*.nupkg
            dist/OddSnap-RELEASES-*
            dist/OddSnap-releases-*.json
            dist/OddSnap-assets-*.json
            dist/winget-manifests/**/*.yaml
          append_body: false
          body_path: docs/CHANGELOG.md

      - name: Submit release to WinGet
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_TOKEN)) {
            throw "WINGET_TOKEN secret is required to submit OddSnap to microsoft/winget-pkgs."
          }

          $version = "${{ steps.version.outputs.version }}"
          $manifestDir = Join-Path $PWD "dist\winget-manifests\$version"

          & scripts/winget/Submit-WingetSubmission.ps1 `
            -ManifestDirectory $manifestDir `
            -GitHubToken $env:WINGET_TOKEN
