name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-x86
          - os: windows-11-arm
            rid: win-arm64

    runs-on: ${{ matrix.os }}
    name: Package ${{ matrix.rid }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Restore dependencies
        run: dotnet restore src/Yoink/Yoink.csproj -r ${{ matrix.rid }}

      - name: Publish
        run: >
          dotnet publish src/Yoink/Yoink.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o publish

      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content src/Yoink/Yoink.csproj -Raw
          $version = ($csproj.Project.PropertyGroup.Version | Select-Object -First 1).Trim()
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version" -Encoding utf8

      - name: Build Velopack package
        shell: pwsh
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          $outDir = Join-Path $PWD "vpk-${{ matrix.rid }}"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          vpk pack `
            --packId JasperDevs.Yoink `
            --packVersion "${{ steps.version.outputs.version }}" `
            --packDir publish `
            --mainExe Yoink.exe `
            --packTitle Yoink `
            --packAuthors jasperdevs `
            --channel "${{ matrix.rid }}" `
            --runtime "${{ matrix.rid }}" `
            --releaseNotes "docs/CHANGELOG.md" `
            --outputDir $outDir

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Velopack-${{ matrix.rid }}
          path: vpk-${{ matrix.rid }}/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content src/Yoink/Yoink.csproj -Raw
          $version = ($csproj.Project.PropertyGroup.Version | Select-Object -First 1).Trim()
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version" -Encoding utf8

      - name: Publish GitHub release via Velopack
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          $repoUrl = "https://github.com/${{ github.repository }}"
          foreach ($channel in @('win-x64', 'win-x86', 'win-arm64')) {
            vpk upload github `
              --repoUrl $repoUrl `
              --token $env:GITHUB_TOKEN `
              --releaseName "Yoink v${{ steps.version.outputs.version }}" `
              --tag "v${{ steps.version.outputs.version }}" `
              --channel $channel `
              --publish `
              --merge `
              --outputDir dist
          }

      - name: Generate winget manifests
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "v$version"
          $baseUrl = "https://github.com/${{ github.repository }}/releases/download/$tag"

          $x64Setup = Get-ChildItem dist -Filter '*win-x64*Setup.exe' | Select-Object -First 1
          $x86Setup = Get-ChildItem dist -Filter '*win-x86*Setup.exe' | Select-Object -First 1
          $arm64Setup = Get-ChildItem dist -Filter '*win-arm64*Setup.exe' | Select-Object -First 1

          if ($null -eq $x64Setup -or $null -eq $x86Setup -or $null -eq $arm64Setup) {
            throw "Expected Velopack setup executables for x64/x86/arm64 were not found in dist."
          }

          & scripts/winget/New-WingetManifests.ps1 `
            -PackageVersion $version `
            -OutputDirectory (Join-Path $PWD 'dist\winget-manifests') `
            -X64InstallerUrl "$baseUrl/$($x64Setup.Name)" `
            -X64InstallerSha256 ((Get-FileHash -Algorithm SHA256 $x64Setup.FullName).Hash.ToUpperInvariant()) `
            -X86InstallerUrl "$baseUrl/$($x86Setup.Name)" `
            -X86InstallerSha256 ((Get-FileHash -Algorithm SHA256 $x86Setup.FullName).Hash.ToUpperInvariant()) `
            -Arm64InstallerUrl "$baseUrl/$($arm64Setup.Name)" `
            -Arm64InstallerSha256 ((Get-FileHash -Algorithm SHA256 $arm64Setup.FullName).Hash.ToUpperInvariant())

      - name: Upload winget manifests to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/winget-manifests/**/*.yaml
          append_body: false
          body_path: docs/CHANGELOG.md

      - name: Submit release to WinGet
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_TOKEN)) {
            throw "WINGET_TOKEN secret is required to submit Yoink to microsoft/winget-pkgs."
          }

          $version = "${{ steps.version.outputs.version }}"
          $manifestDir = Join-Path $PWD "dist\winget-manifests\$version"

          & scripts/winget/Submit-WingetSubmission.ps1 `
            -ManifestDirectory $manifestDir `
            -GitHubToken $env:WINGET_TOKEN
