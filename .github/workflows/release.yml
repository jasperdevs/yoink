name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-x86
          - os: windows-11-arm
            rid: win-arm64

    runs-on: ${{ matrix.os }}
    name: Package ${{ matrix.rid }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Yoink/Yoink.csproj -r ${{ matrix.rid }}

      - name: Publish
        run: >
          dotnet publish src/Yoink/Yoink.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o publish

      - name: Create archive and checksum
        shell: pwsh
        run: |
          $zipName = "Yoink-${{ matrix.rid }}.zip"
          $zipPath = Join-Path $PWD $zipName
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $PWD 'publish\*') -DestinationPath $zipPath -Force
          $hash = (Get-FileHash -Algorithm SHA256 $zipPath).Hash.ToLowerInvariant()
          $checksumPath = "$zipPath.sha256.txt"
          Set-Content -Path $checksumPath -Value "$hash  $zipName" -NoNewline

          $exeName = "Yoink-${{ matrix.rid }}.exe"
          $exePath = Join-Path $PWD $exeName
          Copy-Item -Path (Join-Path $PWD 'publish\Yoink.exe') -Destination $exePath -Force
          $exeHash = (Get-FileHash -Algorithm SHA256 $exePath).Hash.ToLowerInvariant()
          $exeChecksumPath = "$exePath.sha256.txt"
          Set-Content -Path $exeChecksumPath -Value "$exeHash  $exeName" -NoNewline

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Yoink-${{ matrix.rid }}
          path: |
            Yoink-${{ matrix.rid }}.exe
            Yoink-${{ matrix.rid }}.exe.sha256.txt
            Yoink-${{ matrix.rid }}.zip
            Yoink-${{ matrix.rid }}.zip.sha256.txt
          if-no-files-found: error

  publish:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content src/Yoink/Yoink.csproj -Raw
          $version = ($csproj.Project.PropertyGroup.Version | Select-Object -First 1).Trim()
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version" -Encoding utf8

      - name: Generate winget manifests
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "v$version"
          $baseUrl = "https://github.com/${{ github.repository }}/releases/download/$tag"

          $x64Zip = Join-Path $PWD 'dist\Yoink-win-x64.zip'
          $x86Zip = Join-Path $PWD 'dist\Yoink-win-x86.zip'
          $arm64Zip = Join-Path $PWD 'dist\Yoink-win-arm64.zip'

          & scripts/winget/New-WingetManifests.ps1 `
            -PackageVersion $version `
            -OutputDirectory (Join-Path $PWD 'dist\winget-manifests') `
            -X64InstallerUrl "$baseUrl/Yoink-win-x64.zip" `
            -X64InstallerSha256 ((Get-FileHash -Algorithm SHA256 $x64Zip).Hash.ToLowerInvariant()) `
            -X86InstallerUrl "$baseUrl/Yoink-win-x86.zip" `
            -X86InstallerSha256 ((Get-FileHash -Algorithm SHA256 $x86Zip).Hash.ToLowerInvariant()) `
            -Arm64InstallerUrl "$baseUrl/Yoink-win-arm64.zip" `
            -Arm64InstallerSha256 ((Get-FileHash -Algorithm SHA256 $arm64Zip).Hash.ToLowerInvariant())

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.exe
            dist/**/*.exe.sha256.txt
            dist/**/*.zip
            dist/**/*.sha256.txt
            dist/winget-manifests/**/*.yaml
          body_path: RELEASE_NOTES.md
