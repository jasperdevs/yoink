name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-latest
            rid: win-x86
          - os: windows-latest
            rid: win-arm64

    runs-on: ${{ matrix.os }}
    name: Package ${{ matrix.rid }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Prepare code signing
        id: signing
        shell: pwsh
        env:
          WINDOWS_SIGN_PFX_BASE64: ${{ secrets.WINDOWS_SIGN_PFX_BASE64 }}
          WINDOWS_SIGN_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGN_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_PFX_BASE64) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_PFX_PASSWORD)) {
            exit 0
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "oddsnap-signing-cert.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_SIGN_PFX_BASE64))
          Add-Content -Path $env:GITHUB_OUTPUT -Value "pfx_path=$pfxPath" -Encoding utf8
          Add-Content -Path $env:GITHUB_OUTPUT -Value "sign_params=/fd SHA256 /f `"$pfxPath`" /p `"$env:WINDOWS_SIGN_PFX_PASSWORD`" /tr `"http://timestamp.digicert.com`" /td SHA256" -Encoding utf8

      - name: Restore dependencies
        run: dotnet restore src/OddSnap/OddSnap.csproj -r ${{ matrix.rid }}

      - name: Publish
        run: >
          dotnet publish src/OddSnap/OddSnap.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -o publish

      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content src/OddSnap/OddSnap.csproj -Raw
          $version = ($csproj.Project.PropertyGroup.Version | Select-Object -First 1).Trim()
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version" -Encoding utf8

      - name: Build Velopack package
        shell: pwsh
        run: |
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          $outDir = Join-Path $PWD "vpk-${{ matrix.rid }}"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          $packArgs = @(
            'pack',
            '--packId', 'JasperDevs.OddSnap',
            '--packVersion', '${{ steps.version.outputs.version }}',
            '--packDir', 'publish',
            '--mainExe', 'OddSnap.exe',
            '--packTitle', 'OddSnap',
            '--packAuthors', 'jasperdevs',
            '--icon', 'src/OddSnap/oddsnap.ico',
            '--channel', '${{ matrix.rid }}',
            '--runtime', '${{ matrix.rid }}',
            '--releaseNotes', 'docs/CHANGELOG.md'
          )
          if (-not [string]::IsNullOrWhiteSpace('${{ steps.signing.outputs.sign_params }}')) {
            $packArgs += @('--signParams', '${{ steps.signing.outputs.sign_params }}')
          }
          $packArgs += @('--outputDir', $outDir)
          & vpk @packArgs

          $rid = "${{ matrix.rid }}"
          $version = "${{ steps.version.outputs.version }}"
          $required = @(
            '*-Setup.exe',
            '*-Portable.zip',
            '*-full.nupkg',
            'RELEASES-*',
            'releases.*.json',
            'assets.*.json'
          )
          foreach ($pattern in $required) {
            if (-not (Get-ChildItem $outDir -Filter $pattern | Select-Object -First 1)) {
              throw "Expected Velopack output '$pattern' was not found in $outDir."
            }
          }

          $archLabel = $rid -replace '^win-', ''
          $setupName = "App-OddSnap-Setup-$archLabel.exe"
          $portableName = "App-OddSnap-Portable-$archLabel.zip"
          $fullName = "OddSnap-Update-$version-$rid-full.nupkg"

          $setup = Get-ChildItem $outDir -Filter '*-Setup.exe' | Select-Object -First 1
          $portable = Get-ChildItem $outDir -Filter '*-Portable.zip' | Select-Object -First 1
          $full = Get-ChildItem $outDir -Filter '*-full.nupkg' | Select-Object -First 1
          $setupOldName = $setup.Name
          $portableOldName = $portable.Name
          $fullOldName = $full.Name

          Move-Item -LiteralPath $setup.FullName -Destination (Join-Path $outDir $setupName) -Force
          Move-Item -LiteralPath $portable.FullName -Destination (Join-Path $outDir $portableName) -Force
          Move-Item -LiteralPath $full.FullName -Destination (Join-Path $outDir $fullName) -Force

          foreach ($releasesFile in Get-ChildItem $outDir -Filter 'RELEASES-*') {
            $content = Get-Content -LiteralPath $releasesFile.FullName -Raw
            Set-Content -LiteralPath $releasesFile.FullName -Value ($content.Replace($fullOldName, $fullName)) -NoNewline -Encoding utf8
          }

          foreach ($releaseJsonFile in Get-ChildItem $outDir -Filter 'releases.*.json') {
            $releaseJson = Get-Content -LiteralPath $releaseJsonFile.FullName -Raw | ConvertFrom-Json
            foreach ($asset in @($releaseJson.Assets)) {
              if ($asset.FileName -eq $fullOldName) { $asset.FileName = $fullName }
            }
            $releaseJson | ConvertTo-Json -Depth 20 -Compress | Set-Content -LiteralPath $releaseJsonFile.FullName -NoNewline -Encoding utf8
          }

          foreach ($assetsJsonFile in Get-ChildItem $outDir -Filter 'assets.*.json') {
            $assetsJson = Get-Content -LiteralPath $assetsJsonFile.FullName -Raw | ConvertFrom-Json
            foreach ($asset in @($assetsJson)) {
              if ($asset.RelativeFileName -eq $setupOldName) { $asset.RelativeFileName = $setupName }
              if ($asset.RelativeFileName -eq $portableOldName) { $asset.RelativeFileName = $portableName }
              if ($asset.RelativeFileName -eq $fullOldName) { $asset.RelativeFileName = $fullName }
            }
            $assetsJson | ConvertTo-Json -Depth 20 -Compress | Set-Content -LiteralPath $assetsJsonFile.FullName -NoNewline -Encoding utf8
          }

          $expectedFiles = @(
            $setupName,
            $portableName,
            $fullName,
            "RELEASES-$rid",
            "releases.$rid.json",
            "assets.$rid.json"
          )
          $actualFiles = Get-ChildItem $outDir -File | Select-Object -ExpandProperty Name
          foreach ($expectedFile in $expectedFiles) {
            if ($actualFiles -notcontains $expectedFile) {
              throw "Expected release output '$expectedFile' was not found in $outDir."
            }
          }
          if ($actualFiles | Where-Object { $_ -like '0-OddSnap-*' -or $_ -like 'JasperDevs.OddSnap-*' }) {
            throw "Release output contains an old or confusing user-facing asset name: $($actualFiles -join ', ')"
          }
          $assetsJsonText = Get-Content -LiteralPath (Join-Path $outDir "assets.$rid.json") -Raw
          if ($assetsJsonText -notmatch [regex]::Escape($setupName) -or
              $assetsJsonText -notmatch [regex]::Escape($portableName)) {
            throw "assets.$rid.json does not point to the user-facing App-OddSnap download names."
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Velopack-${{ matrix.rid }}
          path: vpk-${{ matrix.rid }}/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Read version
        id: version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content src/OddSnap/OddSnap.csproj -Raw
          $version = ($csproj.Project.PropertyGroup.Version | Select-Object -First 1).Trim()
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version" -Encoding utf8

      - name: Generate winget manifests
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "v$version"
          $baseUrl = "https://github.com/${{ github.repository }}/releases/download/$tag"

          $x64Setup = Get-ChildItem 'dist' -Filter 'App-OddSnap-Setup-x64.exe' | Select-Object -First 1
          $x86Setup = Get-ChildItem 'dist' -Filter 'App-OddSnap-Setup-x86.exe' | Select-Object -First 1
          $arm64Setup = Get-ChildItem 'dist' -Filter 'App-OddSnap-Setup-arm64.exe' | Select-Object -First 1

          if ($null -eq $x64Setup -or $null -eq $x86Setup -or $null -eq $arm64Setup) {
            throw "Expected Velopack setup executables for x64/x86/arm64 were not found in dist."
          }

          & scripts/winget/New-WingetManifests.ps1 `
            -PackageVersion $version `
            -OutputDirectory (Join-Path $PWD 'dist\winget-manifests') `
            -X64InstallerUrl "$baseUrl/$($x64Setup.Name)" `
            -X64InstallerSha256 ((Get-FileHash -Algorithm SHA256 $x64Setup.FullName).Hash.ToUpperInvariant()) `
            -X86InstallerUrl "$baseUrl/$($x86Setup.Name)" `
            -X86InstallerSha256 ((Get-FileHash -Algorithm SHA256 $x86Setup.FullName).Hash.ToUpperInvariant()) `
            -Arm64InstallerUrl "$baseUrl/$($arm64Setup.Name)" `
            -Arm64InstallerSha256 ((Get-FileHash -Algorithm SHA256 $arm64Setup.FullName).Hash.ToUpperInvariant())

      - name: Prepare release manifest filenames
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $sourceDir = Join-Path $PWD "dist\winget-manifests\$version"
          $releaseDir = Join-Path $PWD "dist\release-winget-manifests\$version"
          New-Item -ItemType Directory -Path $releaseDir -Force | Out-Null

          $manifestMap = @{
            'JasperDevs.OddSnap.yaml' = 'OddSnap.winget.yaml'
            'JasperDevs.OddSnap.locale.en-US.yaml' = 'OddSnap.winget.locale.en-US.yaml'
            'JasperDevs.OddSnap.installer.yaml' = 'OddSnap.winget.installer.yaml'
          }

          foreach ($entry in $manifestMap.GetEnumerator()) {
            $source = Join-Path $sourceDir $entry.Key
            if (-not (Test-Path -LiteralPath $source)) {
              throw "Expected WinGet manifest '$($entry.Key)' was not found in $sourceDir."
            }
            Copy-Item -LiteralPath $source -Destination (Join-Path $releaseDir $entry.Value) -Force
          }

      - name: Build release body
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $bodyPath = Join-Path $PWD 'dist\RELEASE_BODY.md'
          $changelog = if (Test-Path 'docs/CHANGELOG.md') { Get-Content 'docs/CHANGELOG.md' -Raw } else { '' }
          $downloadNotes = @'
          ## Downloads

          Most people should download **App-OddSnap-Setup-x64.exe**.

          - **App-OddSnap-Setup-x64.exe** - Windows installer for most PCs
          - **App-OddSnap-Portable-x64.zip** - portable copy for most PCs
          - **arm64** - Windows on ARM
          - **x86** - older 32-bit Windows

          Files named `.nupkg`, `releases.*.json`, `assets.*.json`, `RELEASES-*`, or `.yaml` are for automatic updates and package managers. They are not the normal download.

          ## Changes

          '@
          $body = $downloadNotes + $changelog
          Set-Content -Path $bodyPath -Value ($body -replace "`r?`n          ", "`n") -Encoding utf8

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OddSnap v${{ steps.version.outputs.version }}
          files: |
            dist/App-OddSnap-Setup-*.exe
            dist/App-OddSnap-Portable-*.zip
            dist/OddSnap-Update-*.nupkg
            dist/RELEASES-*
            dist/releases.*.json
            dist/assets.*.json
            dist/release-winget-manifests/**/*.yaml
          append_body: false
          body_path: dist/RELEASE_BODY.md

      - name: Submit release to WinGet
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINGET_TOKEN)) {
            throw "WINGET_TOKEN secret is required to submit OddSnap to microsoft/winget-pkgs."
          }

          $version = "${{ steps.version.outputs.version }}"
          $manifestDir = Join-Path $PWD "dist\winget-manifests\$version"

          & scripts/winget/Submit-WingetSubmission.ps1 `
            -ManifestDirectory $manifestDir `
            -GitHubToken $env:WINGET_TOKEN
