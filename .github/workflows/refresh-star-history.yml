name: Refresh star history cache buster

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update README star history token
        shell: pwsh
        run: |
          $path = "README.md"
          $content = Get-Content -LiteralPath $path -Raw
          $token = (Get-Date).ToUniversalTime().ToString("yyyyMMdd")
          $updated = [regex]::Replace(
            $content,
            "v=\d{8}(?:-\d+)?",
            "v=$token"
          )

          if ($updated -eq $content) {
            "changed=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          Set-Content -LiteralPath $path -Value $updated -NoNewline
          "changed=true" >> $env:GITHUB_OUTPUT
        id: refresh

      - name: Commit updated token
        if: steps.refresh.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          cat > /tmp/star-history-commit-message.txt <<'EOF'
          Refresh the README star history cache token

          The star chart embed is cache-sensitive, so the README token is rotated on a daily schedule to keep the chart fresh without manual edits.
          EOF
          git commit -F /tmp/star-history-commit-message.txt
          git push
