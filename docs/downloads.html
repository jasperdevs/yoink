<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Downloads - Yoink</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav><div class="inner">
    <div class="left">
      <a href="./" class="logo"><img src="favicon.ico" alt="">Yoink</a>
      <div class="links">
        <a href="./">Home</a>
        <a href="downloads.html" class="active">Downloads</a>
        <a href="changelog.html">Changelog</a>
        <a href="donate.html">Donate</a>
      </div>
    </div>
    <div class="right">
      <a href="https://github.com/jasperdevs/yoink" target="_blank" class="star-badge" id="starBadge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span id="starCount"></span>
      </a>
    </div>
  </div></nav>

  <div class="page">
    <h1>Downloads</h1>
    <p class="subtitle">All releases with Windows executables and source code.</p>
    <div id="releases"><div class="loading">Loading releases...</div></div>
  </div>

  <footer>
    <p>Yoink is open source under the GPL-3.0 license.</p>
  </footer>

  <script>
    fetch('https://api.github.com/repos/jasperdevs/yoink')
      .then(r => r.json())
      .then(d => {
        const s = d.stargazers_count;
        document.getElementById('starCount').textContent = s >= 1000 ? (s/1000).toFixed(1)+'k' : s;
      }).catch(() => {});

    function formatSize(b) {
      if (b < 1048576) return (b / 1024).toFixed(0) + ' KB';
      return (b / 1048576).toFixed(1) + ' MB';
    }
    function formatDate(s) {
      return new Date(s).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }
    function archLabel(name) {
      if (name.includes('x64')) return 'x64';
      if (name.includes('x86')) return 'x86';
      if (name.includes('arm64')) return 'ARM64';
      return '';
    }

    async function loadReleases() {
      const res = await fetch('https://api.github.com/repos/jasperdevs/yoink/releases?per_page=20');
      const releases = await res.json();
      const c = document.getElementById('releases');
      if (!releases.length) { c.innerHTML = '<p class="loading">No releases found.</p>'; return; }

      c.innerHTML = releases.map((r, i) => {
        const exes = r.assets.filter(a => a.name.endsWith('.exe'));
        const other = r.assets.filter(a => !a.name.endsWith('.exe'));
        const hasOther = other.length > 0;
        const id = 'extra-' + i;

        return `
        <div class="release-card">
          <div class="header">
            <div>
              <span class="tag">${r.tag_name}</span>
              ${i === 0 ? '<span class="badge">Latest</span>' : ''}
            </div>
            <span class="date">${formatDate(r.published_at)}</span>
          </div>
          <div class="assets">
            ${exes.map(a => `
              <a href="${a.browser_download_url}">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Windows ${archLabel(a.name)}
                <span class="size">${formatSize(a.size)}</span>
              </a>
            `).join('')}
            ${hasOther ? `<button class="show-more-btn" onclick="document.getElementById('${id}').style.display=this.style.display='none'?'':'flex'">More</button>` : ''}
          </div>
          ${hasOther ? `<div class="assets" id="${id}" style="display:none;margin-top:6px">
            ${other.map(a => `
              <a href="${a.browser_download_url}">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                ${a.name} <span class="size">${formatSize(a.size)}</span>
              </a>
            `).join('')}
            <a href="${r.zipball_url}">Source (.zip)</a>
          </div>` : ''}
        </div>`;
      }).join('');
    }
    loadReleases();
  </script>
</body>
</html>
