<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donate - Yoink</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav><div class="inner">
    <div class="left">
      <a href="./" class="logo"><img src="favicon.ico" alt="">Yoink</a>
      <div class="links">
        <a href="./">Home</a>
        <a href="downloads.html">Downloads</a>
        <a href="changelog.html">Changelog</a>
        <a href="donate.html" class="active">Donate</a>
      </div>
    </div>
    <div class="right">
      <a href="https://github.com/jasperdevs/yoink" target="_blank" class="star-badge" id="starBadge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span id="starCount"></span>
      </a>
    </div>
  </div></nav>

  <div class="page">
    <h1>Support Yoink</h1>
    <p class="subtitle">Yoink is free and open source. If you find it useful, consider supporting development.</p>

    <div class="donate-cards">
      <a href="https://ko-fi.com/jasperdevs" target="_blank" class="donate-card">
        <img src="https://storage.ko-fi.com/cdn/brandasset/v2/kofi_s_logo_nolabel.png" alt="Ko-fi">
        <h3>Ko-fi</h3>
        <p>Buy me a coffee</p>
        <span class="btn btn-primary" style="font-size:13px;padding:8px 20px;">Donate</span>
      </a>
      <a href="https://www.paypal.com/paypalme/9KGFX" target="_blank" class="donate-card">
        <img src="https://www.paypalobjects.com/webstatic/icon/pp258.png" alt="PayPal">
        <h3>PayPal</h3>
        <p>Send a one-time donation</p>
        <span class="btn btn-primary" style="font-size:13px;padding:8px 20px;">Donate</span>
      </a>
      <a href="https://github.com/jasperdevs/yoink" target="_blank" class="donate-card">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="#888" style="margin-bottom:12px"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
        <h3>GitHub</h3>
        <p>Star the repo</p>
        <span class="btn btn-secondary" style="font-size:13px;padding:8px 20px;">Star</span>
      </a>
    </div>
  </div>

  <footer>
    <p>Yoink is open source under the GPL-3.0 license.</p>
  </footer>

  <script>
    fetch('https://api.github.com/repos/jasperdevs/yoink')
      .then(r => r.json())
      .then(d => {
        const s = d.stargazers_count;
        document.getElementById('starCount').textContent = s >= 1000 ? (s/1000).toFixed(1)+'k' : s;
      }).catch(() => {});
  </script>
</body>
</html>
