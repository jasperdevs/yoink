<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog - Yoink</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav><div class="inner">
    <div class="left">
      <a href="./" class="logo"><img src="favicon.ico" alt="">Yoink</a>
      <div class="links">
        <a href="./">Home</a>
        <a href="downloads.html">Downloads</a>
        <a href="changelog.html" class="active">Changelog</a>
        <a href="donate.html">Donate</a>
      </div>
    </div>
    <div class="right">
      <a href="https://github.com/jasperdevs/yoink" target="_blank" class="star-badge" id="starBadge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <span id="starCount"></span>
      </a>
    </div>
  </div></nav>

  <div class="page">
    <h1>Changelog</h1>
    <p class="subtitle">Release notes from GitHub.</p>
    <div id="changelog"><div class="loading">Loading changelog...</div></div>
  </div>

  <footer>
    <p>Yoink is open source under the GPL-3.0 license.</p>
  </footer>

  <script>
    fetch('https://api.github.com/repos/jasperdevs/yoink')
      .then(r => r.json())
      .then(d => {
        const s = d.stargazers_count;
        document.getElementById('starCount').textContent = s >= 1000 ? (s/1000).toFixed(1)+'k' : s;
      }).catch(() => {});

    function formatDate(s) {
      return new Date(s).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }
    function md(t) {
      if (!t) return '';
      return t
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h2>$1</h2>')
        .replace(/^\- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>\n?)+/gs, m => '<ul>' + m + '</ul>')
        .replace(/\n\n/g, '<br>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`(.+?)`/g, '<code>$1</code>');
    }

    fetch('https://api.github.com/repos/jasperdevs/yoink/releases?per_page=30')
      .then(r => r.json())
      .then(releases => {
        const c = document.getElementById('changelog');
        if (!releases.length) { c.innerHTML = '<p class="loading">No releases found.</p>'; return; }
        c.innerHTML = releases.map(r => `
          <div class="changelog-entry">
            <h2>${r.tag_name}</h2>
            <div class="date">${formatDate(r.published_at)}</div>
            <div class="body">${md(r.body)}</div>
          </div>
        `).join('');
      });
  </script>
</body>
</html>
